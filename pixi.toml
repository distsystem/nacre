[workspace]
channels = ["https://repo.prefix.dev/meta-forge", "conda-forge"]
name = "nacre"
platforms = ["linux-64"]
preview = ["pixi-build"]
version = "0.1.0" # x-release-please-version

[package]
name = "nacre"
version = "0.1.0" # x-release-please-version

[package.build]
backend = { name = "pixi-build-python", version = "*" }

[package.host-dependencies]
python = ">=3.12"
hatchling = "*"

[package.run-dependencies]
python = ">=3.12"
pydantic = ">=2"
pydantic-settings = ">=2.6"
pyyaml = ">=6"

[dependencies]
python = ">=3.12"
pydantic = ">=2"
pydantic-settings = ">=2.6"
pyyaml = ">=6"
pytest = ">=8"
nacre = { path = "." }

[tasks]
test = "pytest tests/ -v"
schema = "python -c \"from nacre.config import NacreSettings; import json, pathlib; pathlib.Path('schema.json').write_text(json.dumps(NacreSettings.model_json_schema(), indent=2) + '\\n')\""
