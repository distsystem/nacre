[workspace]
channels = ["https://repo.prefix.dev/meta-forge", "conda-forge"]
name = "nacre"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12"

[feature.dev.dependencies]
pytest = ">=8.0"

[environments]
dev = ["dev"]

[pypi-dependencies]
nacre = { path = ".", editable = true }

[feature.dev.tasks]
test = "pytest tests/ -v"
