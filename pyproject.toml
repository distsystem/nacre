[project]
name = "branch-materializer"
version = "0.1.0"
description = "Materialize Git branches from declarative layered specs"
requires-python = ">=3.12"
dependencies = []

[project.scripts]
branch-materializer = "branch_materializer.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/branch_materializer"]

[tool.pytest.ini_options]
testpaths = ["tests"]
